<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💚TooDoo List for Deadpool💚</title>
    <link rel="icon" type="image/png" href="ImagefromGboardClipboard.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        * { cursor: none !important; }

        body {
            min-height: 100vh;
            background: hsl(248, 45%, 8%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; align-items: flex-start; justify-content: center;
            overflow-x: hidden;
        }

        .bg-image-layer {
            position: fixed; inset: 0; z-index: 0;
            background: #050210;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        #bgPhoto {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            min-width: 100%; min-height: 100%;
            width: auto; height: auto;
            object-fit: cover;
            object-position: center center;
            filter: brightness(0.35) saturate(0.85);
        }

        .bg-image-layer::after {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(135deg, rgba(8,4,25,0.50) 0%, rgba(18,8,45,0.38) 50%, rgba(8,4,25,0.52) 100%);
            pointer-events: none; z-index: 1;
        }

        #customCursor { position: fixed; width: 18px; height: 18px; background: radial-gradient(circle, #9d80f4, #7c3aed); border-radius: 50%; pointer-events: none; z-index: 99999; transform: translate(-50%,-50%); transition: transform 0.1s ease, width 0.2s, height 0.2s; mix-blend-mode: screen; box-shadow: 0 0 20px #a78bfa, 0 0 40px #7c3aed; }
        #cursorTrail { position: fixed; width: 8px; height: 8px; background: rgba(167,139,250,0.5); border-radius: 50%; pointer-events: none; z-index: 99998; transform: translate(-50%,-50%); transition: all 0.12s ease; }
        #cursorAura { position: fixed; width: 40px; height: 40px; border: 2px solid rgba(167,139,250,0.3); border-radius: 50%; pointer-events: none; z-index: 99997; transform: translate(-50%,-50%); transition: all 0.25s ease; }
        #particleCanvas { position: fixed; inset: 0; pointer-events: none; z-index: 2; }

        .aurora { position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; }
        .aurora-layer { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.07; animation: auroraFloat 12s ease-in-out infinite alternate; }
        .aurora-1 { width: 700px; height: 700px; background: radial-gradient(circle, #667eea, transparent); top: -200px; left: -200px; }
        .aurora-2 { width: 600px; height: 600px; background: radial-gradient(circle, #764ba2, transparent); bottom: -200px; right: -200px; animation-delay: -4s; }
        .aurora-3 { width: 500px; height: 500px; background: radial-gradient(circle, #f093fb, transparent); top: 40%; left: 40%; animation-delay: -8s; }
        @keyframes auroraFloat { 0% { transform: translate(0,0) scale(1); } 33% { transform: translate(60px,-40px) scale(1.1); } 66% { transform: translate(-40px,60px) scale(0.9); } 100% { transform: translate(30px,30px) scale(1.05); } }

        .grid-overlay { position: fixed; inset: 0; z-index: 0; pointer-events: none; background-image: linear-gradient(rgba(102,126,234,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(102,126,234,0.04) 1px, transparent 1px); background-size: 50px 50px; }
        .bg-emoji { position: fixed; opacity: 0.08; animation: floatUp linear infinite; pointer-events: none; z-index: 0; filter: drop-shadow(0 0 6px rgba(167,139,250,0.4)); }
        @keyframes floatUp { 0% { transform: translateY(100vh) rotate(0deg) scale(0.8); opacity: 0; } 10% { opacity: 0.1; } 90% { opacity: 0.08; } 100% { transform: translateY(-120px) rotate(360deg) scale(0.8); opacity: 0; } }

        /* ===== THEME TESTER ===== */
        .theme-tester { position: fixed; top: 16px; left: 16px; background: rgba(10,8,30,0.92); backdrop-filter: blur(16px); border: 1px solid rgba(167,139,250,0.3); border-radius: 16px; padding: 14px 16px; z-index: 9990; color: white; font-size: 0.76rem; width: 220px; }
        .theme-tester h5 { font-size: 0.78rem; color: #a78bfa; font-weight: 700; margin-bottom: 10px; }
        .theme-tester label { display: flex; justify-content: space-between; margin-bottom: 6px; color: rgba(255,255,255,0.7); }
        .theme-tester input[type="range"] { width: 100%; margin-top: 4px; accent-color: #a78bfa; cursor: none; }
        .theme-preview { width: 100%; height: 28px; border-radius: 8px; margin-top: 8px; border: 1px solid rgba(255,255,255,0.1); }
        .theme-time-label { text-align: center; margin-top: 5px; color: #a78bfa; font-weight: 700; font-size: 0.7rem; }
        .btn-theme-reset { width: 100%; margin-top: 8px; padding: 6px; background: rgba(167,139,250,0.2); border: 1px solid rgba(167,139,250,0.3); border-radius: 8px; color: white; cursor: none; font-size: 0.7rem; font-weight: 600; }

        /* ===== SIDE GAMES ===== */
        .side-game { position: fixed; top: 50%; transform: translateY(-50%); width: 200px; z-index: 5; }
        .side-game.left  { left: 8px; }
        .side-game.right { right: 8px; }
        .side-game-box { background: rgba(15,12,41,0.85); backdrop-filter: blur(20px); border: 1px solid rgba(167,139,250,0.25); border-radius: 20px; padding: 12px; color: white; text-align: center; box-shadow: 0 8px 32px rgba(102,126,234,0.2); position: relative; overflow: hidden; }
        .side-game-box::before { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 2px; background: linear-gradient(90deg, transparent, #a78bfa, transparent); animation: scanLine 3s linear infinite; }
        @keyframes scanLine { 0% { left: -100%; } 100% { left: 200%; } }
        .side-game-box h4 { font-size: 0.8rem; font-weight: 700; margin-bottom: 8px; background: linear-gradient(90deg, #a78bfa, #f9a8d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .game-tabs { display: flex; gap: 6px; margin-bottom: 10px; background: rgba(15,12,41,0.5); border-radius: 12px; padding: 4px; border: 1px solid rgba(167,139,250,0.15); }
        .game-tab { flex: 1; padding: 7px 4px; border: none; border-radius: 8px; background: transparent; color: rgba(255,255,255,0.5); font-size: 0.78rem; cursor: none; transition: all 0.3s; font-weight: 600; }
        .game-tab.active { background: linear-gradient(135deg, rgba(102,126,234,0.5), rgba(118,75,162,0.5)); color: white; }
        .game-tab:hover:not(.active) { background: rgba(167,139,250,0.15); color: rgba(255,255,255,0.8); }
        .game-panel { animation: fadePanel 0.3s ease; }
        @keyframes fadePanel { from { opacity:0; transform: translateY(5px); } to { opacity:1; transform: translateY(0); } }
        .btn-game-side { width: 100%; margin-top: 8px; background: linear-gradient(135deg, rgba(102,126,234,0.3), rgba(118,75,162,0.3)); color: white; border: 1px solid rgba(167,139,250,0.4); padding: 6px; border-radius: 10px; font-size: 0.78rem; cursor: none; font-weight: 700; transition: all 0.3s; }
        .game-info-tiny { margin-top: 8px; background: rgba(15,12,41,0.4); border-radius: 10px; padding: 8px; font-size: 0.68rem; color: rgba(255,255,255,0.65); line-height: 1.5; text-align: left; border: 1px solid rgba(167,139,250,0.1); }
        .game-info-tiny b { color: #a78bfa; }
        .game-history { margin-top: 6px; background: rgba(15,12,41,0.5); border-radius: 8px; padding: 6px 8px; border: 1px solid rgba(167,139,250,0.1); }
        .game-history-title { font-size: 0.65rem; color: rgba(167,139,250,0.7); font-weight: 700; margin-bottom: 4px; text-transform: uppercase; }
        .history-row { display: flex; justify-content: space-between; font-size: 0.65rem; color: rgba(255,255,255,0.6); padding: 2px 0; }
        .history-row .h-val { color: #a78bfa; font-weight: 700; }

        .puzzle-area { display: grid; grid-template-columns: repeat(3, 1fr); gap: 3px; padding: 6px; background: rgba(15,12,41,0.5); border-radius: 12px; border: 1px solid rgba(167,139,250,0.2); min-height: 155px; }
        .puzzle-tile { aspect-ratio: 1; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; font-weight: 800; cursor: none; transition: all 0.2s; border: 1px solid rgba(167,139,250,0.2); user-select: none; }
        .puzzle-tile.filled { background: linear-gradient(135deg, rgba(102,126,234,0.4), rgba(118,75,162,0.4)); color: white; }
        .puzzle-tile.filled:hover { background: linear-gradient(135deg, rgba(102,126,234,0.7), rgba(118,75,162,0.7)); transform: scale(1.05); }
        .puzzle-tile.empty { background: rgba(255,255,255,0.04); border: 1px dashed rgba(167,139,250,0.2); }
        .puzzle-tile.correct { background: linear-gradient(135deg, rgba(81,207,102,0.4), rgba(47,158,68,0.4)) !important; border-color: rgba(81,207,102,0.5) !important; }
        .puzzle-score-row { display: flex; justify-content: space-between; margin-top: 6px; font-size: 0.72rem; font-weight: 700; }

        .memory-area { display: grid; grid-template-columns: repeat(4, 1fr); gap: 3px; padding: 6px; background: rgba(15,12,41,0.5); border-radius: 12px; border: 1px solid rgba(167,139,250,0.2); min-height: 155px; }
        .mem-card { aspect-ratio: 1; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 1rem; cursor: none; transition: all 0.3s; border: 1px solid rgba(167,139,250,0.2); user-select: none; }
        .mem-card.face-down { background: linear-gradient(135deg, rgba(102,126,234,0.3), rgba(118,75,162,0.3)); }
        .mem-card.face-down::after { content: '?'; color: rgba(255,255,255,0.5); font-weight: 800; font-size: 0.9rem; }
        .mem-card.face-down:hover { background: linear-gradient(135deg, rgba(102,126,234,0.5), rgba(118,75,162,0.5)); transform: scale(1.08); }
        .mem-card.face-up { background: linear-gradient(135deg, rgba(249,168,212,0.25), rgba(167,139,250,0.25)); border-color: rgba(249,168,212,0.4); }
        .mem-card.matched { background: linear-gradient(135deg, rgba(81,207,102,0.3), rgba(47,158,68,0.3)) !important; border-color: rgba(81,207,102,0.5) !important; }
        .mem-score-row { display: flex; justify-content: space-between; margin-top: 6px; font-size: 0.72rem; font-weight: 700; }

        .snake-canvas { width: 100%; height: 140px; border-radius: 10px; border: 1px solid rgba(167,139,250,0.2); background: rgba(15,12,41,0.6); display: block; }
        .snake-btn { width: 28px; height: 28px; border-radius: 6px; background: rgba(102,126,234,0.3); border: 1px solid rgba(167,139,250,0.3); color: white; font-size: 0.7rem; cursor: none; transition: all 0.2s; display: flex; align-items: center; justify-content: center; }

        .mole-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; padding: 4px; min-height: 140px; }
        .mole-hole { aspect-ratio: 1; border-radius: 50%; background: rgba(15,12,41,0.6); border: 2px solid rgba(167,139,250,0.2); display: flex; align-items: center; justify-content: center; font-size: 1.4rem; cursor: none; transition: all 0.15s; }
        .mole-hole.has-mole { background: rgba(102,126,234,0.3); border-color: #a78bfa; transform: scale(1.08); }
        .mole-hole.has-mole:hover { transform: scale(1.15); background: rgba(102,126,234,0.5); }
        .mole-hole.whacked { background: rgba(81,207,102,0.3) !important; border-color: #51cf66 !important; }
        .mole-hole.missed { background: rgba(255,107,107,0.2) !important; }
        .wam-score-row { display: flex; justify-content: space-between; margin-top: 6px; font-size: 0.72rem; font-weight: 700; }

        /* ===== CAT ===== */
        .dp-cat-container { position: fixed; bottom: 30px; right: 30px; z-index: 9990; user-select: none; }

        .dp-bubble { position: absolute; bottom: 92px; right: 0; background: rgba(10,8,30,0.95); border: 1.5px solid rgba(167,139,250,0.4); border-radius: 16px 16px 4px 16px; padding: 10px 14px; min-width: 175px; max-width: 230px; color: white; font-size: 0.77rem; line-height: 1.5; backdrop-filter: blur(16px); box-shadow: 0 8px 24px rgba(102,126,234,0.25); display: none; animation: bubblePop 0.3s cubic-bezier(0.34,1.56,0.64,1); z-index: 9991; }
        @keyframes bubblePop { from { transform: scale(0.5) translateY(10px); opacity:0; } to { transform: scale(1) translateY(0); opacity:1; } }
        .dp-bubble.show { display: block; }
        .dp-bubble-text { color: rgba(255,255,255,0.92); margin-bottom: 5px; }
        .dp-bubble-name { font-size: 0.63rem; color: #a78bfa; font-weight: 700; }

        .dp-cat-svg-wrap { width: 80px; height: 80px; cursor: none !important; position: relative; filter: drop-shadow(0 6px 16px rgba(0,0,0,0.35)); transition: transform 0.3s ease; animation: catFloat 3s ease-in-out infinite; }
        .dp-cat-svg-wrap:hover { transform: scale(1.12) translateY(-4px); }
        @keyframes catFloat { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        .dp-cat-svg-wrap.happy   { animation: catHappy 0.6s ease-in-out infinite alternate; }
        .dp-cat-svg-wrap.excited { animation: catExcited 0.3s ease-in-out infinite; }
        .dp-cat-svg-wrap.sleeping { animation: catSleep 4s ease-in-out infinite; }
        @keyframes catHappy   { 0% { transform: translateY(0) rotate(-3deg); } 100% { transform: translateY(-8px) rotate(3deg); } }
        @keyframes catExcited { 0% { transform: rotate(-5deg) scale(1); } 100% { transform: rotate(5deg) scale(1.06); } }
        @keyframes catSleep   { 0%,100% { transform: translateY(0) rotate(-2deg); } 50% { transform: translateY(3px) rotate(2deg); } }
        .dp-zzz { position: absolute; top: -14px; right: -4px; font-size: 0.72rem; color: #a78bfa; font-weight: 800; animation: floatZzz 2s ease-in-out infinite; display: none; }
        .dp-cat-svg-wrap.sleeping .dp-zzz { display: block; }
        @keyframes floatZzz { 0% { transform: translateY(0) scale(1); opacity:1; } 100% { transform: translateY(-18px) scale(1.4); opacity:0; } }
        .dp-hearts { position: absolute; top: -18px; left: 50%; transform: translateX(-50%); font-size: 0.85rem; animation: floatHearts 1.5s ease-in-out infinite; display: none; }
        .dp-cat-svg-wrap.loved .dp-hearts { display: block; }
        @keyframes floatHearts { 0% { transform: translateX(-50%) translateY(0); opacity:1; } 100% { transform: translateX(-50%) translateY(-22px); opacity:0; } }

        /* ===== CHAT WINDOW ===== */
        .dp-chat-window {
            position: fixed; bottom: 120px; right: 30px; width: 300px;
            background: rgba(10,8,30,0.96);
            border: 1px solid rgba(167,139,250,0.35);
            border-radius: 20px; z-index: 9992;
            display: none; flex-direction: column;
            box-shadow: 0 20px 60px rgba(90,77,138,0.35);
            backdrop-filter: blur(20px); overflow: hidden; max-height: 420px;
            transition: all 0.35s cubic-bezier(0.34,1.56,0.64,1);
        }
        .dp-chat-window.open { display: flex; }
        .dp-chat-window.maximized {
            width: calc(100vw - 80px) !important;
            height: calc(100vh - 60px) !important;
            max-height: none !important;
            bottom: 30px !important; right: 30px !important;
            border-radius: 24px !important;
        }
        .dp-chat-window.maximized .dp-chat-messages { max-height: calc(100vh - 200px) !important; }

        .dp-chat-header {
            background: linear-gradient(135deg, #5a4d8a, #3d2f6e);
            padding: 12px 16px; display: flex; align-items: center; gap: 10px;
            border-bottom: 1px solid rgba(167,139,250,0.2); flex-shrink: 0;
        }
        .dp-chat-avatar { width: 32px; height: 32px; background: rgba(167,139,250,0.3); border: 1px solid rgba(167,139,250,0.4); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
        .dp-chat-title { font-size: 0.85rem; font-weight: 700; color: white; }
        .dp-chat-subtitle { font-size: 0.65rem; color: rgba(255,255,255,0.7); }
        .dp-ai-badge { font-size: 0.58rem; padding: 1px 6px; border-radius: 10px; font-weight: 700; margin-top: 2px; display: inline-block; }
        .dp-ai-badge.groq { background: rgba(81,207,102,0.25); color: #51cf66; border: 1px solid rgba(81,207,102,0.4); }
        .dp-ai-badge.preset { background: rgba(167,139,250,0.2); color: #a78bfa; border: 1px solid rgba(167,139,250,0.3); }
        .dp-header-btns { margin-left: auto; display: flex; gap: 5px; }
        .dp-hdr-btn { width: 26px; height: 26px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15); border-radius: 7px; color: rgba(255,255,255,0.8); font-size: 0.7rem; cursor: none; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
        .dp-hdr-btn:hover { background: rgba(255,255,255,0.2); color: white; }

        .dp-chat-messages { flex:1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; max-height: 280px; }
        .dp-chat-messages::-webkit-scrollbar { width: 4px; }
        .dp-chat-messages::-webkit-scrollbar-thumb { background: #7c3aed; border-radius: 4px; }

        .dp-msg { max-width: 85%; padding: 8px 12px; border-radius: 14px; font-size: 0.78rem; line-height: 1.5; animation: msgSlide 0.3s ease; }
        @keyframes msgSlide { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform: translateY(0); } }
        .dp-msg.user { background: linear-gradient(135deg, rgba(102,126,234,0.3), rgba(118,75,162,0.3)); border: 1px solid rgba(167,139,250,0.3); color: white; align-self: flex-end; border-radius: 14px 14px 4px 14px; }
        .dp-msg.bot { background: rgba(90,77,138,0.25); border: 1px solid rgba(167,139,250,0.25); color: white; align-self: flex-start; border-radius: 14px 14px 14px 4px; }
        .dp-msg.bot .msg-name { font-size: 0.62rem; color: #a78bfa; font-weight: 700; margin-bottom: 3px; display: block; }
        .dp-msg.system { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); color: rgba(255,255,255,0.45); font-size: 0.68rem; text-align: center; align-self: center; padding: 4px 10px; border-radius: 20px; }

        .dp-chat-input-area { padding: 10px 12px; border-top: 1px solid rgba(167,139,250,0.15); display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
        .dp-chat-input { flex:1; background: rgba(255,255,255,0.06); border: 1px solid rgba(167,139,250,0.25); border-radius: 20px; padding: 8px 14px; color: white; font-size: 0.78rem; outline: none; font-family: inherit; }
        .dp-chat-input::placeholder { color: rgba(255,255,255,0.3); }
        .dp-chat-input:focus { border-color: #a78bfa; box-shadow: 0 0 0 3px rgba(167,139,250,0.1); }
        .dp-chat-send { width: 36px; height: 36px; min-width: 36px; background: linear-gradient(135deg, #7c3aed, #5a4d8a); border: none; border-radius: 50%; color: white; font-size: 0.85rem; cursor: none; transition: all 0.2s; display: flex; align-items: center; justify-content: center; }
        .dp-chat-send:hover { transform: scale(1.1); }

        .dp-typing { display: none; align-self: flex-start; background: rgba(90,77,138,0.2); border: 1px solid rgba(167,139,250,0.2); border-radius: 14px 14px 14px 4px; padding: 8px 14px; }
        .dp-typing.show { display: flex; gap: 4px; align-items: center; }
        .dp-typing span { width: 6px; height: 6px; background: #a78bfa; border-radius: 50%; animation: typingBounce 1s infinite; }
        .dp-typing span:nth-child(2) { animation-delay: 0.2s; }
        .dp-typing span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typingBounce { 0%,100% { t
